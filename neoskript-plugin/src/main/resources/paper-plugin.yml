name: NeoSkript
version: '${version}'
main: co.xenastudios.neoskript.plugin.NeoSkriptPlugin
api-version: '${apiVersion}'
authors: [XenaStudios]
description: A fast, modern, drop-in replacement for Skript.
website: https://github.com/XenaStudios/NeoSkript
folia-supported: true
# Paper plugins do not support YAML command declarations; the /neoskript command is registered
# at runtime via the server command map in NeoSkriptPlugin#onEnable.
permissions:
  neoskript.admin:
    description: Allows reloading NeoSkript scripts.
    default: op
