name: Release

# Automated releases via release-please, driven by Conventional Commits.
#
# On each push to main, release-please maintains a "release PR" that bumps version.txt + CHANGELOG.md.
# Merging that PR creates the git tag + GitHub Release; the publish job then builds and attaches the
# plugin jar, publishes neoskript-api/neoskript-core to GitHub Packages, and (if configured) uploads
# to Modrinth.
#
# Modrinth requires repo settings:
#   - Variable MODRINTH_PROJECT_ID  (project id or slug)
#   - Secret   MODRINTH_TOKEN       (API token with write access)
# Minecraft versions for Modrinth come from gradle.properties (minecraftVersions).
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -PneoskriptVersion=${{ needs.release-please.outputs.version }} --no-daemon --stacktrace

      - name: Stage jar
        run: |
          mkdir -p dist
          cp neoskript-plugin/build/libs/neoskript-plugin-*.jar "dist/NeoSkript-${{ needs.release-please.outputs.version }}.jar"

      - name: Upload jar to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*.jar --clobber

      - name: Publish API to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :neoskript-api:publish :neoskript-core:publish -PneoskriptVersion=${{ needs.release-please.outputs.version }} --no-daemon --stacktrace

      - name: Read Minecraft versions
        id: mc
        run: echo "versions=$(grep '^minecraftVersions=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: ${{ vars.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/*.jar
          name: NeoSkript ${{ needs.release-please.outputs.version }}
          version: ${{ needs.release-please.outputs.version }}
          version-type: ${{ contains(needs.release-please.outputs.version, '-') && 'beta' || 'release' }}
          loaders: |
            paper
            folia
            purpur
          game-versions: ${{ steps.mc.outputs.versions }}
          java: 25
          changelog: See https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}
