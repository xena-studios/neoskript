name: Nightly

# Rebuilds on every push to main and refreshes a single rolling "nightly" prerelease, so the latest
# commit's plugin jar is always downloadable from a stable URL:
#   https://github.com/<owner>/<repo>/releases/download/nightly/NeoSkript-nightly.jar
on:
  push:
    branches: [ main ]

permissions:
  contents: write

# Only the most recent push needs a nightly; cancel older in-flight runs.
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          ./gradlew build -PneoskriptVersion="1.0.0-nightly-${SHORT_SHA}" --no-daemon --stacktrace

      - name: Stage jar
        run: |
          mkdir -p dist
          cp neoskript-plugin/build/libs/neoskript-plugin-*.jar dist/NeoSkript-nightly.jar

      - name: Update rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Replace the previous nightly release and move its tag to this commit.
          gh release delete nightly --cleanup-tag --yes || true
          gh release create nightly dist/NeoSkript-nightly.jar \
            --title "Nightly (latest main)" \
            --notes "Automated build of \`${{ github.sha }}\` ($(git rev-parse --short HEAD))." \
            --prerelease \
            --target "${{ github.sha }}"
