name: Nightly

# Rebuilds on every push to main and refreshes a single rolling "nightly" prerelease, so the latest
# commit's plugin jar is always downloadable from a stable URL:
#   https://github.com/<owner>/<repo>/releases/download/nightly/NeoSkript-nightly.jar
on:
  push:
    branches: [ main ]

permissions:
  contents: write

# Only the most recent push needs a nightly; cancel older in-flight runs.
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    # Skip release-please's release commits — those are built and published by the Release workflow.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          ./gradlew build -PneoskriptVersion="1.0.0-nightly-${SHORT_SHA}" --no-daemon --stacktrace

      - name: Stage jar
        run: |
          mkdir -p dist
          cp neoskript-plugin/build/libs/neoskript-plugin-*.jar dist/NeoSkript-nightly.jar

      - name: Update rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          NOTES="Automated build of \`$SHA\` ($(git rev-parse --short HEAD))."
          # Update the existing nightly release in place (replace the asset, refresh notes) rather
          # than deleting and recreating it — so watchers aren't re-notified on every push and the
          # tag isn't churned. Create it once if it doesn't exist yet.
          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly --prerelease --target "$SHA" \
              --title "Nightly (latest main)" --notes "$NOTES"
          fi
          gh release upload nightly dist/NeoSkript-nightly.jar --clobber
          gh release edit nightly --notes "$NOTES"
